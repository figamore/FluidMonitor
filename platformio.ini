[env:esp32-cyd-capacitive]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 748800

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    lvgl/lvgl@^8.3.11
    figamore/FluidNC-EspNow-Client@^1.0.0

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -D CORE_DEBUG_LEVEL=1

board_build.partitions = huge_app.csv

[env:esp32-cyd-capacitive-ip5306-shutdown]
extends = env:esp32-cyd-capacitive
build_flags =
    ${env:esp32-cyd-capacitive.build_flags}
    -D FLUIDMONITOR_ENABLE_SHUTDOWN=1
    -D FLUIDMONITOR_SHUTDOWN_GPIO=17
    -D FLUIDMONITOR_SHUTDOWN_PULLUP=1
    -D FLUIDMONITOR_SHUTDOWN_DOUBLE_TAP_MS=650
    -D FLUIDMONITOR_SHUTDOWN_TAP_LOCKOUT_MS=60
    -D FLUIDMONITOR_SHUTDOWN_HOLD_MS=10200
    -D FLUIDMONITOR_SHUTDOWN_DEBUG=1
