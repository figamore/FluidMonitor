name: Publish web installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, or "latest"'
        required: true
        default: latest
      firmware_variant:
        description: "Firmware asset variant to prefer"
        required: true
        default: esp32-cyd

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout FluidNC ESP-NOW branch
        uses: actions/checkout@v4
        with:
          repository: figamore/FluidNC
          ref: feature/esp-now
          path: fluidnc

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-fluidnc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build installer from release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 tools/build_web_installer.py \
            --repo "${{ github.repository }}" \
            --release-tag "${{ inputs.release_tag }}" \
            --variant "${{ inputs.firmware_variant }}" \
            --site-dir web-installer

      - name: Build FluidNC ESP-NOW firmware
        working-directory: fluidnc
        run: |
          pio run -e wifi
          cp .pio/build/wifi/firmware.bin "$GITHUB_WORKSPACE/web-installer/fluidnc_esp32_firmware.bin"
          pio run -e wifi_s3
          cp .pio/build/wifi_s3/firmware.bin "$GITHUB_WORKSPACE/web-installer/fluidnc_esp32s3_firmware.bin"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web-installer

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
